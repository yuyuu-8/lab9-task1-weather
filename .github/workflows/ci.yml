name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Tests + Android (APK) + Web (Wasm)
        run: |
          chmod +x ./gradlew
          xvfb-run -a ./gradlew :shared:jvmTest :androidApp:assembleDebug :webApp:wasmJsBrowserDistribution --no-daemon --stacktrace

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weather-artifacts
          path: |
            androidApp/build/outputs/apk/debug/*.apk
            webApp/build/dist/wasmJs/productionExecutable
          if-no-files-found: ignore
